name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Find and Build
        run: |
          # Find the directory containing gradlew and move there
          GRADLEW_DIR=$(find . -name "gradlew" -exec dirname {} \; | head -n 1)
          cd "$GRADLEW_DIR"
          
          # Grant execute permission
          chmod +x gradlew
          
          # Build the APK
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: **/build/outputs/apk/debug/app-debug.apk
